<slot>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.slim.js" integrity="sha512-3KSCKtGNyFpYAh0N2MFQMqQSqGpHa7Cn5YC7yTjVbCQ2CBA1LfP/ZgID0TEq7IikLqn/jy3uoexY6RU5Eco7CQ==" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.3.1/fabric.min.js" integrity="sha512-ACqMrfAtm537AWzgx/xQ57JnFxXeq8RylQMGg4y/e6M2ew4Z8NycE8aId/Bt2ZE+w1gNsox3MgwxKl7SGMRdtA==" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw==" crossorigin="anonymous"></script>
	<script src="canvas-toBlob.js"></script>
	<script>
		let head = document.querySelector('head')
			color1 = '#4449b7'
			color2 = '#f2f3ff'
		style = document.createElement('style')
		style.innerHTML = ':root{--primary:' + color1 + ';--secondary:' + color2 + ';}'
		head.appendChild(style)

		document.getElementById("uploadBtn").onchange = function () {
			document.getElementById("uploadFile").value = this.files[0].name;
		};
		var canvas = new fabric.Canvas('c');
		canvas.setWidth(1080);
		canvas.setHeight(1080);

		var canvasWrapper = document.getElementById('c');
		var canvasWrapperWidth = canvasWrapper.clientWidth;
		$(function () {
			$(":file").change(function () {
				if (this.files && this.files[0]) {
					var reader = new FileReader();
					reader.onload = imageIsLoaded;
					reader.readAsDataURL(this.files[0]);
				}
			});
		});
		fabric.Image.fromURL('twibbon.png',function(img){
			img.scaleToWidth(canvas.getWidth());
			canvas.setOverlayImage(img, canvas.renderAll.bind(canvas));
		});
		function imageIsLoaded(e) {
			fabric.Image.fromURL(e.target.result,function(img){
				var aspectRatio = 1080/1080;
				var factor = 1080 / img.width;
				img.set({
					scaleX: factor,
					scaleY: factor 
				});
				canvas.add(img);
				canvas.item(0).set({
					borderColor: 'gray',
					cornerColor: 'black',
					cornerSize: 70,
					borderScaleFactor: 10,
					hasBorders: true,

					rotatingPointOffset:200,
					padding:60, 
					transparentCorners: true
				});
				canvas.setActiveObject(canvas.item(0));
				this.__canvases.push(canvas);
				canvas.sendToBack(img);
			});
		};
		// $("#download").click(function(){
		// 	$("#c").get(0).toBlob(function(blob){
		// 		saveAs(blob, "myIMG.png");
		// 	});
		// });
		document.querySelector('.download').onclick = function() {
			document.querySelector('#c')[0].toBlob(function(blob) {
				let fileName = name.split(' ').join('-').toLowerCase() + '.png'
				saveAs(blob, fileName)
			})
		}
	</script>
