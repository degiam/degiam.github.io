<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AHA Centre</title>
    <meta name="description" content="JogjaCamp Instant Website">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Cache -->
	<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="cache-control" content="max-age=0">
	<meta http-equiv="cache-control" content="no-cache">
	<meta http-equiv="expires" content="0">
	<meta http-equiv="expires" content="Wed, 01 Jan 2020 1:00:00 GMT">
	<meta http-equiv="pragma" content="no-cache">
	<!-- Cookie -->
	<script type="text/javascript">var d=new Date;function addCookie(e,i,o){d.setTime(d.getTime()+24*o*60*60*1e3),document.cookie=e+"="+i+"; expires="+d.toGMTString()}addCookie("visit",d.getTime(),"1");</script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://ahacentre.org/wp-content/uploads/2018/01/favicon-16.png">
    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.4.1/css/bootstrap.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i,600,600i,700,700i&display=swap">
    <!-- Javascript -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <!-- Main -->
    <link rel="stylesheet" type="text/css" href="https://kelimutu.wunik.id/themes/backend/default/css/main.css"/>
    <script type="text/javascript" src="https://kelimutu.wunik.id/themes/backend/default/js/main.js"></script>
</head>
<body>

<div class="container vh-100">
	<div class="row h-100">
		<div class="col-md-7 col-lg-6 col-xl-5 py-3 m-auto">

			<div id="login" class="bg-white p-5 rounded shadow">
				<center><img class="img-fluid mt-3 mb-5" src="https://ahacentre.org/wp-content/uploads/2020/11/logo-web.png"></center>

				<form spellcheck="false" method="POST" action="https://kelimutu.wunik.id/password/email">
					<div class="mb-4 pb-3">
						Type your email address to reset your password
					</div>
					<div class="form-group focus">
						<input id="email" type="email" name="email" class="form-control" required autofocus value>
						<label for="email">E-Mail Address</label>
					</div>
					<button class="btn btn-primary mt-3" type="submit">
						Reset Password
					</button>
				</form>
			</div>

		</div>
	</div>
</div>

</body>
</html>
