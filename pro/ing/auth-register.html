<body>

<main>
	<section>
		<div class="row no-gutters">
			<div class="col-md-6">
				<h1 class="font-theme-1 fs-1 text-break mb-0 d-none">Pendaftaran - BBPOM Informasi Nilai Gizi</h1>
				<img class="w-100 vh-100 obj-fit-cover login-banner" src="assets/img/main.jpg" alt="Cover Banner">
			</div>
			<div class="col-md-6">
				<div class="d-flex flex-column vh-md-100">

					<div class="p-4 p-md-5">
						<div class="d-flex align-items-center menu-top">
							<a class="btn btn-outline-primary btn-block rounded-pill text-uppercase font-weight-bold py-2 px-4" href="/pro/ing/auth-login">
								Login
							</a>
							<a class="btn btn-outline-primary btn-block rounded-pill text-uppercase font-weight-bold py-2 px-4 active" href="/pro/ing/auth-register">
								Pendaftaran
							</a>
						</div>

						<div class="mt-4">
							<form spellcheck="false">
								<div class="form-group">
									<label class="opacity-5" for="registerName" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Nama Lengkap <span class="text-danger pr-1">*</span></label>
									<input type="text" class="form-control" name="register" id="registerName" required>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerEmail" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Email <span class="text-danger pr-1">*</span></label>
									<input type="email" class="form-control" name="register" id="registerEmail" required>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerPhone" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Telepon / HP <span class="text-danger pr-1">*</span></label>
									<input type="text" class="form-control" name="register" id="registerPhone" required>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerGender" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Jenis Kelamin <span class="text-danger pr-1">*</span></label>
									<div class="form-inline mt-n1">
										<div class="form-check">
											<input class="form-check-input mt-0" type="radio" name="register" id="registerGender1" value="Laki-laki">
											<label class="form-check-label fs-6 ml-1" for="registerGender1">
												Laki-laki
											 </label>
										</div>
										<div class="form-check">
											<input class="form-check-input mt-0" type="radio" name="register" id="registerGender2" value="Perempuan">
											<label class="form-check-label fs-6 ml-1" for="registerGender2">
												Perempuan
											 </label>
										</div>
									</div>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerAddress" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Alamat <span class="text-danger pr-1">*</span></label>
									<input type="text" class="form-control" name="register" id="registerAddress" required>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerCompany" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Instansi / Institusi / Perusahaan <span class="text-danger pr-1">*</span></label>
									<input type="text" class="form-control" name="register" id="registerCompany" required>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerPassword" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Kata Sandi <span class="text-danger pr-1">*</span></label>
									<input type="password" class="form-control" name="register" id="registerPassword" required>
								</div>
								<div class="form-group">
									<label class="opacity-5" for="registerRepeatPassword" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Ulangi Kata Sandi <span class="text-danger pr-1">*</span></label>
									<input type="password" class="form-control" name="register" id="registerRepeatPassword" required>
								</div>
								<div class="d-sm-flex align-items-center justify-content-between">
									<label class="mb-sm-0" for="registerCaptcha">
										<span class="opacity-5" data-toggle="tooltip" data-placement="right" title="Wajib Diisi">Captcha <span class="text-danger pr-1">*</span></span>
										<img class="captcha d-block mt-2 mb-1 mb-sm-0" src="https://kelimutu.wunik.id/captcha/flat?xBWKrUG5" alt="Captcha">
									</label>
									<input type="text" class="form-control mt-sm-4 ml-sm-2" name="register" id="registerCaptcha" required>
								</div>
								<div class="d-md-flex align-items-center justify-content-between mt-4">
									<div class="form-group form-check mr-2">
										<input type="checkbox" class="form-check-input" name="register" id="registerAgreement" required>
										<label class="form-check-label" for="registerAgreement">Saya menyetujui <a target="_blank" href="/pro/ing/auth-terms">Syarat dan Ketentuan, serta Kebijakan Privasi</a></label>
									</div>
									<div class="form-group text-right">
										<!-- <button type="submit" class="btn btn-success px-4">Daftar</button> -->
										<button type="button" class="btn btn-success px-4" onclick="window.location.href='/pro/ing/home'">Daftar</button>
									</div>
								</div>
							</form>
						</div>
					</div>

					<div class="mt-3 mt-md-auto fs-7 text-center pb-4 opacity-5 d-none d-md-block footer"></div>

				</div>
			</div>
		</div>
	</section>

		</div>
	</footer>
