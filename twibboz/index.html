<section>
	<div class="title">

	<div class="d-flex">

			<svg viewBox="0 0 24 24" width="25" height="25">
				<path fill="currentColor" d="M21 6H17.8L16 4H10V6H15.1L17 8H21V20H5V11H3V20C3 21.1 3.9 22 5 22H21C22.1 22 23 21.1 23 20V8C23 6.9 22.1 6 21 6M8 14C8 18.45 13.39 20.69 16.54 17.54C19.69 14.39 17.45 9 13 9C10.24 9 8 11.24 8 14M13 11C14.64 11.05 15.95 12.36 16 14C15.95 15.64 14.64 16.95 13 17C11.36 16.95 10.05 15.64 10 14C10.05 12.36 11.36 11.05 13 11M5 6H8V4H5V1H3V4H0V6H3V9H5"/>
			</svg>
			<span>Pilih Foto</span>
			<input type="file">
		</button>
		<button type="button" class="button block download">
			<svg viewBox="0 0 24 24" width="25" height="25">
				<path fill="currentColor" d="M2 12H4V17H20V12H22V17C22 18.11 21.11 19 20 19H4C2.9 19 2 18.11 2 17V12M12 15L17.55 9.54L16.13 8.13L13 11.25V2H11V11.25L7.88 8.13L6.46 9.55L12 15Z"/>

<slot>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.3.1/fabric.min.js" integrity="sha512-ACqMrfAtm537AWzgx/xQ57JnFxXeq8RylQMGg4y/e6M2ew4Z8NycE8aId/Bt2ZE+w1gNsox3MgwxKl7SGMRdtA==" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw==" crossorigin="anonymous"></script>
	<script src="canvas-toBlob.js"></script>
	<script>
		let head = document.querySelector('head')
			color1 = '#4449b7'
			color2 = '#f2f3ff'
		style = document.createElement('style')
		style.innerHTML = ':root{--primary:' + color1 + ';--secondary:' + color2 + ';}'
		head.appendChild(style)

		var canvas = new fabric.Canvas('editor')

		canvas.setWidth(1080)
		canvas.setHeight(1080)

		var canvasWrapper = document.getElementById('editor')
			canvasWrapperWidth = canvasWrapper.clientWidth

		document.querySelector('[type="file"]').onchange = function() {
			if (this.files && this.files[0]) {
				var reader = new FileReader()
				reader.onload = imageIsLoaded
				reader.readAsDataURL(this.files[0])
			}
		}

		fabric.Image.fromURL('https://drive.google.com/uc?export=view&id=1iOES-STMbg2ZHxLM4ReEbk8KQrhFZwcD',function(img) {
			img.scaleToWidth(canvas.getWidth())
			canvas.setOverlayImage(img, canvas.renderAll.bind(canvas))
		})

		function imageIsLoaded(e) {
			fabric.Image.fromURL(e.target.result,function(img) {
				var aspectRatio = 1080/1080
				var factor = 1080 / img.width
				img.set({
					scaleX: factor,
					scaleY: factor 
				})
				canvas.add(img)
				canvas.item(0).set({
					borderColor: 'gray',
					cornerColor: 'black',
					cornerSize: 70,
					borderScaleFactor: 10,
					hasBorders: true,
					rotatingPointOffset: 200,
					padding: 60,
					transparentCorners: true
				})
				canvas.setActiveObject(canvas.item(0))
				this.__canvases.push(canvas)
				canvas.sendToBack(img)
			})
		}

		document.querySelector('.download').onclick = function() {
			canvasWrapper[0].toBlob(function(blob) {
				saveAs(blob, 'myIMG.png')
			})
		}
	</script>
</slot>
