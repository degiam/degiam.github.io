				<path fill="currentColor" d="M3.9,12C3.9,10.29 5.29,8.9 7,8.9H11V7H7A5,5 0 0,0 2,12A5,5 0 0,0 7,17H11V15.1H7C5.29,15.1 3.9,13.71 3.9,12M8,13H16V11H8V13M17,7H13V8.9H17C18.71,8.9 20.1,10.29 20.1,12C20.1,13.71 18.71,15.1 17,15.1H13V17H17A5,5 0 0,0 22,12A5,5 0 0,0 17,7Z"/>
			</svg>
			<span>Salin Tautan</span>
		</button>

</section>

<footer></footer>

<slot>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.slim.js" integrity="sha512-3KSCKtGNyFpYAh0N2MFQMqQSqGpHa7Cn5YC7yTjVbCQ2CBA1LfP/ZgID0TEq7IikLqn/jy3uoexY6RU5Eco7CQ==" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.3.1/fabric.min.js" integrity="sha512-ACqMrfAtm537AWzgx/xQ57JnFxXeq8RylQMGg4y/e6M2ew4Z8NycE8aId/Bt2ZE+w1gNsox3MgwxKl7SGMRdtA==" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw==" crossorigin="anonymous"></script>
	<script src="canvas-toBlob.js"></script>
	<script>
		// Color
			let head = document.querySelector('head')
				style = document.createElement('style')
				style.innerHTML = ':root{--primary:' + mainColor + ';--secondary:' + bgColor + ';}'
			head.appendChild(style)

		// Campaign Detail
			let account = document.querySelector('.account')
			account.innerHTML = campaignAccount

			let avatar = document.querySelector('.avatar')
			avatar.alt = campaignAccount
			avatar.src = campaignAvatar
			avatar.srcset = campaignAvatar + ' 1x,' + campaignAvatar + ' 2x'

			let h1 = document.querySelector('h1')
			h1.innerHTML = campaignTitle

			let desc = document.querySelector('.desc')
			desc.innerHTML = campaignDesc

			let post = document.querySelector('textarea')
			post.innerHTML = campaignCaption

		// Variable
			var bar = document.querySelectorAll('.bar')
				section = document.querySelectorAll('section')
				textarea = document.querySelector('textarea')

		// Image Canvas
			var canvas = new fabric.Canvas('layer')
				canvasWrapper = document.querySelector('#layer')
				canvasWrapperWidth = canvasWrapper.clientWidth

			canvas.setWidth(1080)
			canvas.setHeight(1080)

			document.querySelector('[type="file"]').onchange = function() {
				if (this.files && this.files[0]) {
					var reader = new FileReader()
					reader.onload = imageIsLoaded
					reader.readAsDataURL(this.files[0])
					document.querySelector('.upload span').innerText = 'Ganti Foto'
					document.querySelector('.download').classList.remove('d-none')
				}
			}

			function generate() {
				fabric.Image.fromURL(campaignFilter,function(img) {
					canvas.clear()
					img.scaleToWidth(canvas.getWidth())
					canvas.setOverlayImage(img, canvas.renderAll.bind(canvas))
				})
			}

			generate()

			function imageIsLoaded(e) {
				generate()

				fabric.Image.fromURL(e.target.result,function(img) {
					var aspectRatio = 1080/1080
						factor = 1080 / img.width

					img.set({
						scaleX: factor,
						scaleY: factor
					})

					canvas.add(img)

					if ( img.width > img.height ) {
						var y = (canvas.getHeight() - (img.height/2)) / 2
					} else if ( img.width < img.height ) {
						let x = ((img.width/2) - canvas.getWidth()) / 2
						var y = ( x / 2 ) - x
					} else {
						var y = 0
					}

					canvas.item(0).set({
						top: y,
						cornerColor: '#275fdc',
						cornerSize: 25,
						padding: 13,
						transparentCorners: false
					})

					// canvas.setActiveObject(canvas.item(0))
					this.__canvases.push(canvas)
					canvas.sendToBack(img)
				})
			}

		// Canvas Frame
			function frame() {
				document.querySelector('.canvas-container').style.height = document.querySelector('.canvas-container').clientWidth + 'px'
			}
			frame()

		// Caption
			function caption() {
				if (textarea.clientHeight < textarea.scrollHeight) {
					textarea.style.height = textarea.scrollHeight + 'px'
				}
			}
			caption()

		// Button
			function section1() {
				window.scrollTo(0,0)
				bar[1].classList.toggle('active')
				section[0].classList.toggle('d-none')
				section[1].classList.toggle('d-none')
			}
			function section2() {
				window.scrollTo(0,0)
				bar[2].classList.toggle('active')
				section[1].classList.toggle('d-none')
				section[2].classList.toggle('d-none')
			}
			function section3() {
				window.scrollTo(0,0)
				bar[3].classList.toggle('active')
				section[2].classList.toggle('d-none')
				section[3].classList.toggle('d-none')
			}

			section[1].querySelector('.back').onclick = function() { section1(), frame() }
			section[2].querySelector('.back').onclick = function() { section2() }
			section[3].querySelector('.back').onclick = function() { section3() }

			document.querySelector('.download').onclick = function() {
				$('#layer').get(0).toBlob(function(blob) {
					let fileName = campaignTitle.split(' ').join('-').toLowerCase() + '.png'
					saveAs(blob, fileName)
					section1()
					caption()
				})
			}

			document.querySelector('.copy').onclick = function() {
				let clipboard = document.createElement('textarea')
					clipboard.style.opacity = '0'
					clipboard.style.position = 'absolute'

				clipboard.innerHTML = textarea.innerHTML
				document.body.appendChild(clipboard)
				clipboard.select()
				document.execCommand('copy')
				document.body.removeChild(clipboard)

				section2()
			}

			document.querySelector('.skip').onclick = function() {
				section3()
			}

			document.querySelector('.share').onclick = function() {
				let clipboard = document.createElement('input')
					clipboard.style.opacity = '0'
					clipboard.style.position = 'absolute'

				clipboard.value = thisURL
				document.body.appendChild(clipboard)
				clipboard.select()
				document.execCommand('copy')
				document.body.removeChild(clipboard)
			}

			function popup(url,title,width,height) { 
				let x = (window.innerWidth - width) / 2
					y = ((window.innerHeight - height) / 2) + 50
				window.open(url, title, 'width=' + width + ', height=' + height + ', top=' + y + ', left=' + x)
				return false
			}

			document.querySelector('.facebook').onclick = function() {
				popup('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(thisURL) + '&quote=' + shareText, 'facebook-share-dialog', 600, 350)
			}

			document.querySelector('.twitter').onclick = function() {
				popup('https://twitter.com/share?text=' + shareText + '&amp;url=' + thisURL, 'Twitter-dialog', 600, 350)
			}

		// Copyright
			let year = new Date().getFullYear()
			document.querySelector('footer').innerHTML = '© ' + year + ' Twibboz by <a href="https://degiam.github.io" target="_blank">Degiam</a>'

		// Responsive
			var viewportWidth
			var setViewportWidth = function () {
				viewportWidth = window.innerWidth || document.documentElement.clientWidth
			}

			var logWidth = function () {
				if (viewportWidth < 768) {
					frame()
				} else {
					frame()
				}
			}

			setViewportWidth()
			logWidth()

			window.addEventListener('resize', function () {
				setViewportWidth()
				logWidth()
			}, false)
	</script>
</slot>

</body>
</html>
